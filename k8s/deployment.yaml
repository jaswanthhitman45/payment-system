apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-system
  template:
    metadata:
      labels:
        app: payment-system
    spec:
      containers:
      - name: payment-container
        image: your-docker-id/payment-app:latest
        ports:
        - containerPort: 8080
